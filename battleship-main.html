<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship!</title>
    <link rel="stylesheet" href="battleship-main.css">
</head>
<body>
    <h1>Battleship!</h1>
    <main>
    <div class="boards">
        <div class="board-container">
            <h2 class="board-title">Computer's Board</h2>
            <table class="board" id="comp-board">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="board-container">
            <h2 class="board-title">Your Board</h2>
            <table class="board" id="player-board">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <!-- Placement phase: visible at start -->
    <div id="placement-controls" class="player-info-row">
        <p id="status-msg" class="turn-indicator">Place your Aircraft Carrier (5)</p>
        <button id="rotate-btn">Rotate: Horizontal</button>
    </div>

    <!-- Game phase: hidden until ships are placed -->
    <div id="game-controls" style="display: none;">
        <div class="player-info-row">
            <p class="turn-indicator">Your turn</p>
            <button id="new-game-btn">New Game</button>
        </div>
        <div class="controls">
            <label for="row-select">Row</label>
            <select id="row-select"></select>

            <label for="column-select">Column</label>
            <select id="column-select"></select>

            <button id="fire-btn">Fire</button>
        </div>
    </div>
</main>
<script src="battleship.js"></script>
</body>
</html>
